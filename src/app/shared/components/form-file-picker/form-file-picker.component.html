<ion-list inset>
  @let file = _value();
  @if (file !== undefined) {
  <ion-item button [detail]="false" (click)="viewFile()">
    <ion-icon name="videocam-outline" slot="start" color="primary"></ion-icon>
    <ion-label>
      <h3>{{ _fileTypeLabel() }}</h3>
      <p>{{ file.name }}</p>
    </ion-label>
    <ion-button fill="clear" slot="end" color="danger" (click)="removeFile()">
      <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-item>
  } @else {
  <ion-item button [detail]="false" (click)="selectFileMenu()">
    <ion-icon name="videocam-outline" slot="start" color="medium"></ion-icon>
    <ion-label color="dark">
      <h3>Choose {{ _fileTypeLabel() }}</h3>
      <p>Select a {{ _fileTypeLabel() }} from your device</p>
    </ion-label>
    <ion-icon name="chevron-forward-outline" slot="end" color="medium"></ion-icon>
  </ion-item>
  }
</ion-list>
