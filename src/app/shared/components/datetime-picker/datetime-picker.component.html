<ion-datetime-button [datetime]="_id"></ion-datetime-button>
<ion-modal [keepContentsMounted]="true">
  <ng-template>
    <ion-datetime 
      [id]="_id" 
      [showDefaultButtons]="true" 
      [disabled]="_isDisabled()"
      [value]="_value()"
      (ionChange)="valueSubmitted($event.detail.value)"
    ></ion-datetime>
  </ng-template>
</ion-modal>
