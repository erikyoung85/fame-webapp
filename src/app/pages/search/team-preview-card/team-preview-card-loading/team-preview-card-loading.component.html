<ion-card 
  class="custom-card"
  style="
    --card-width: 10rem;
    --card-padding: 0.75rem;
    --card-items-gap: 0.5rem;
    --card-title-size: 1rem;
    --card-content-size: 0.875rem;
  "
>
  <ion-card-header>
    <ion-card-title><ion-skeleton-text></ion-skeleton-text></ion-card-title>
    <ion-card-subtitle><ion-skeleton-text></ion-skeleton-text></ion-card-subtitle>
  </ion-card-header>
</ion-card>
