<ion-grid *ngIf="userProfile$ | async | unwrapAsync as userProfile" class="flex-fill flex-col">
  <ion-row>
    <ion-col>
      <ion-row class="ion-justify-content-center">
        <ion-col size="auto">
          <app-user-profile-avatar size="xxlarge" [avatarSrc]="userProfile.avatarUrl" [border]="true"></app-user-profile-avatar>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col class="ion-text-center">
          <ion-text><h1 class="ion-text-xl">{{ userProfile.firstName }} {{ userProfile.lastName }}</h1></ion-text>
        </ion-col>
      </ion-row>
      <ion-row class="ion-justify-content-center" *ngIf="userProfile.isAdmin">
        <ion-col size="auto" *ngIf="userProfile.isAdmin">
          <shared-pill>Admin</shared-pill>
        </ion-col>
      </ion-row>
    </ion-col>
  </ion-row>

  <ion-list>
    <ion-item>
      <ion-icon name="mail" slot="start"></ion-icon>
      <ion-label>
        <h3>Email</h3>
        <ion-note>{{ userProfile.email }}</ion-note>
      </ion-label>
    </ion-item>
  </ion-list>

  <ng-container *ngrxLet="managedTeamPages$ as managedTeamPages">
    <ion-list *ngIf="managedTeamPages.length > 0">
      <ion-list-header class="ion-margin-vertical">Managed Team Pages</ion-list-header>
      <ion-item *ngFor="let team of managedTeamPages" button (click)="onTeamClicked(team.id)">
        <app-user-profile-avatar slot="start" [avatarSrc]="team.avatarUrl"></app-user-profile-avatar>
        <ion-label>{{ team.title }}</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>

  <ng-container *ngrxLet="managedAthletePages$ as managedAthletePages">
    <ion-list *ngIf="managedAthletePages.length > 0">
      <ion-list-header class="ion-margin-vertical">Managed Athlete Pages</ion-list-header>
      <ion-item *ngFor="let athlete of managedAthletePages" button (click)="onAthleteClicked(athlete.id)">
        <app-user-profile-avatar slot="start" [avatarSrc]="athlete.avatarUrl"></app-user-profile-avatar>
        <ion-label>{{ athlete.title }}</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>

  <ion-row style="margin-top: auto">
    <ion-col>
      <ion-button fill="outline" color="danger" expand="block" (click)="onLogoutClicked()">Logout</ion-button>
    </ion-col>
  </ion-row>
</ion-grid>
