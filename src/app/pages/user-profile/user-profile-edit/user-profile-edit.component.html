<ion-grid class="flex-fill flex-col">
  <ion-row>
    <ion-col>
      <ion-row class="ion-justify-content-center">
        <ion-col size="auto">
          <app-user-profile-avatar
            size="xxlarge"
            editMode
            [formControl]="form.controls.avatarUrl"
            [border]="true"
          ></app-user-profile-avatar>
        </ion-col>
      </ion-row>
    </ion-col>
  </ion-row>

  <ion-row class="flex-fill">
    <ion-col>
      <ion-row>
        <ion-col>
          <ion-input
            [formControl]="form.controls.firstName"
            label="First Name"
            labelPlacement="stacked"
            placeholder="First Name"
            errorText="First Name is required"
          ></ion-input>
        </ion-col>
        <ion-col>
          <ion-input
            [formControl]="form.controls.lastName"
            label="Last Name"
            labelPlacement="stacked"
            placeholder="Last Name"
            errorText="Last Name is required"
          ></ion-input>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-input
            [formControl]="form.controls.email"
            type="email"
            label="Email"
            labelPlacement="stacked"
            placeholder="email@domain.com"
            errorText="Please enter a valid email"
          ></ion-input>
        </ion-col>
      </ion-row>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col>
      <ion-button expand="block" (click)="onUpdateUserProfileClicked()">Save Changes</ion-button>
    </ion-col>
  </ion-row>
</ion-grid>
