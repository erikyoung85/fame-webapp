
<ion-content class="ion-padding">
  <ion-grid>
    <!-- Top text -->
    <ion-row>
      <ion-col class="ion-text-center">
        <ion-icon name="ban-outline" class="icon-xxl"></ion-icon>
        <ion-text><h1 class="ion-text-xl">Reset Password</h1></ion-text>
        <ion-text><p>Enter a new password for your account</p></ion-text>
      </ion-col>
    </ion-row>


    <!-- Email/Password login (optional) -->
    <ion-row>
      <ion-col>
        <form (ngSubmit)="resetPasswordClicked()">
          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="form.controls.password"
                fill="outline"
                name="password"
                type="password"
                label="Password"
                labelPlacement="floating"
                errorText="Password must be at least 8 characters long and include uppercase, lowercase, number, and special character"
              >
                @if (form.controls.password.dirty) {
                  <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                }
              </ion-input>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="form.controls.confirmPassword"
                fill="outline"
                name="confirm-password"
                type="password"
                label="Confirm Password"
                labelPlacement="floating"
                errorText="Password must match"
              >
                @if (form.controls.confirmPassword.dirty) {
                  <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                }
              </ion-input>
            </ion-col>
          </ion-row>
        
          <ion-row>
            <ion-col>
              <ion-button expand="block" type="submit">
                Reset Password
              </ion-button>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col>
              <ion-button expand="block" fill="clear" (click)="onCancelClicked()">
                Back to home page
              </ion-button>
            </ion-col>
          </ion-row>
        </form>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
