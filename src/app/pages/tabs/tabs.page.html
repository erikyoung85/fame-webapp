<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button [tab]="myTeamTab.route">
      <ion-icon *ngIf="myTeamTab.icon" [name]="myTeamTab.icon"></ion-icon>
      <ion-icon *ngIf="myTeamTab.iconSrc" [src]="myTeamTab.iconSrc"></ion-icon>
      <ion-label>{{ myTeamTab.label }}</ion-label>
    </ion-tab-button>
    <ng-container *ngFor="let tab of tabs">
      <ion-tab-button [tab]="tab.route">
        <ion-icon *ngIf="tab.icon" [name]="tab.icon"></ion-icon>
        <ion-icon *ngIf="tab.iconSrc" [src]="tab.iconSrc"></ion-icon>
        <ion-label>{{ tab.label }}</ion-label>
      </ion-tab-button>
    </ng-container>
  </ion-tab-bar>
</ion-tabs>
