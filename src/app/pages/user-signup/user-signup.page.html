<ion-header>
  <ion-toolbar>
    <ion-title>Register</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onLoginClicked()">Login</ion-button>
    </ion-buttons>
    <ion-progress-bar type="indeterminate" *ngIf="isLoading$ | async"></ion-progress-bar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Register</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-grid>
    <!-- Top text -->
    <ion-row class="ion-margin-bottom">
      <ion-col>
        <ion-text><ion-note>Sign up to get started</ion-note></ion-text>
      </ion-col>
    </ion-row>


    <!-- Registration form -->
    <ion-row class="ion-margin-vertical">
      <ion-col>
        <form (ngSubmit)="signupWithEmail()">
          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="userSignupForm.controls.firstName"
                fill="outline"
                name="first name"
                label="First Name"
                labelPlacement="floating"
                errorText="First Name is required"
              ></ion-input>
            </ion-col>
            <ion-col>
              <ion-input
                [formControl]="userSignupForm.controls.lastName"
                fill="outline"
                name="last name"
                label="Last Name"
                labelPlacement="floating"
                errorText="Last Name is required"
              ></ion-input>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="userSignupForm.controls.email"
                fill="outline"
                name="email"
                type="email"
                label="Email"
                labelPlacement="floating"
                errorText="Please enter a valid email"
              ></ion-input>
            </ion-col>
          </ion-row>
    
          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="userSignupForm.controls.password"
                fill="outline"
                name="password"
                type="password"
                label="Password"
                labelPlacement="floating"
                errorText="Password must be at least 8 characters long and include uppercase, lowercase, number, and special character"
              >
                <ion-input-password-toggle *ngIf="userSignupForm.controls.password.dirty" slot="end"></ion-input-password-toggle>
              </ion-input>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col>
              <ion-input
                [formControl]="userSignupForm.controls.password"
                fill="outline"
                name="confirm password"
                type="password"
                label="Confirm Password"
                labelPlacement="floating"
                errorText="Passwords must match"
              >
                <ion-input-password-toggle *ngIf="userSignupForm.controls.password.dirty" slot="end"></ion-input-password-toggle>
              </ion-input>
            </ion-col>
          </ion-row>
    
          <ion-row>
            <ion-col>
              <ion-button expand="block" type="submit">
                Create Account
              </ion-button>
            </ion-col>
          </ion-row>
        </form>
      </ion-col>
    </ion-row>

    <div *ngIf="false">

      <!-- Divider -->
       <ion-row class="ion-margin-vertical">
        <ion-col>
          <shared-divider text="or"></shared-divider>
        </ion-col>
       </ion-row>
  
      <!-- Social Logins -->
      <ion-row>
        <ion-col>
            <ion-button
              disabled
              color="light"
              expand="block"
              (click)="signupWithProvider('google')"
            >
              <ion-icon slot="start" name="logo-google"></ion-icon>
              Continue with Google
            </ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
            <ion-button
              disabled
              color="dark"
              expand="block"
              (click)="signupWithProvider('apple')"
            >
              <ion-icon slot="start" name="logo-apple"></ion-icon>
              Continue with Apple
            </ion-button>
        </ion-col>
      </ion-row>
    </div>
  </ion-grid>
</ion-content>
