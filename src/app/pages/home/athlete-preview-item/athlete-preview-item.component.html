<ion-item button [detail]="false" lines="none" color="light">
  <ion-avatar slot="start">
    <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
  </ion-avatar>
  <ion-label>
    <ion-text><b>{{ athlete.name }}</b></ion-text><br />
    <ion-text><ion-note color="medium">{{ athlete.team }}</ion-note></ion-text>
  </ion-label>
</ion-item>
