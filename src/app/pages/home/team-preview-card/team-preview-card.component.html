<ion-card 
  class="custom-card"
  style="
    --card-width: 9rem;
    --card-padding: 1rem;
    --card-items-gap: 0.5rem;
    --card-title-size: 1rem;
  "
>
  <ion-card-header>
    <ion-card-title>{{ team.name }}</ion-card-title>
    <ion-card-subtitle>{{ team.sport }}</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <ion-button size="small" [fill]="team.favorite ? 'solid' : 'outline'">
      <ion-icon slot="start" [name]="team.favorite ? 'star' : 'star-outline'"></ion-icon>
      Favorite
    </ion-button>
  </ion-card-content>
</ion-card>
