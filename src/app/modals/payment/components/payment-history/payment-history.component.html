<ion-header>
  <ion-toolbar color="primary">
    <ion-title>History</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <h2 class="title">Past Payments</h2>

  <ion-list>
    <ion-item lines="full" *ngFor="let record of history">
      <ion-label>
        <h2>Paid ${{ record.amount / 100 }} to {{ record.to }}</h2>
        <p>{{ record.date | date:'short' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
