<ion-card class="ion-no-margin">
  <ion-card-header>
    <ion-card-title>
      Confirm your account
    </ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-text>
      Please check your email to confirm your account and then login
    </ion-text>

  </ion-card-content>
  <div class="ion-padding">
    <ion-button (click)="onCloseClicked()">Go to login</ion-button>
  </div>
</ion-card>
